<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caccia al Tesoro 🏍️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;800&display=swap');

:root {
  --black:    #0a0a0a;
  --dark:     #111111;
  --dark2:    #1a1a1a;
  --dark3:    #222222;
  --orange:   #ff6600;
  --orange2:  #ff8c00;
  --orange3:  #ffaa33;
  --chrome:   #c0c0c0;
  --chrome2:  #888888;
  --white:    #f0f0f0;
  --green:    #4caf50;
  --red:      #e53935;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Texture noise overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 999;
}

/* ══════════════ HEADER ══════════════ */
header {
  background: var(--dark);
  border-bottom: 3px solid var(--orange);
  position: relative;
  overflow: hidden;
  padding-bottom: 0;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px 22px;
}

.logo-badge {
  background: var(--dark2);
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  padding: 6px 10px;
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
}

.logo-img {
  max-width: 110px;
  width: 100%;
  height: auto;
  display: block;
}

.header-main {
  position: relative;
}

.header-main h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 2.1rem;
  font-weight: 700;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--white);
  text-transform: uppercase;
}

.header-main h1 span {
  color: var(--orange);
}

.header-sub {
  margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--chrome2);
  text-transform: uppercase;
}

#percorso-label {
  color: var(--orange);
}

/* Orange bottom stripe */
.header-stripe {
  height: 4px;
  background: linear-gradient(90deg, var(--orange2), var(--orange3), var(--orange2));
  background-size: 200% 100%;
  animation: shimmer 3s infinite linear;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ══════════════ PROGRESS ══════════════ */
.progress-section {
  padding: 16px 20px 0;
  position: relative;
  z-index: 1;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-meta span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--chrome2);
  text-transform: uppercase;
}

.progress-meta .count {
  color: var(--orange);
}

.progress-track {
  background: var(--dark3);
  border: 1px solid #333;
  border-radius: 2px;
  height: 8px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--orange3));
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  width: 33%;
  position: relative;
}

/* Moving glint on progress */
.progress-fill::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 40px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: glint 2s infinite;
}

@keyframes glint {
  0%   { left: -40px; }
  100% { left: 100%; }
}

/* ══════════════ MAIN ══════════════ */
main {
  padding: 20px 16px 40px;
  max-width: 520px;
  margin: 0 auto;
}

/* ══════════════ QUESTION CARD ══════════════ */
.question-card {
  background: var(--dark2);
  border: 1px solid #2a2a2a;
  border-left: 3px solid var(--orange);
  border-radius: 4px;
  padding: 20px 18px 18px;
  margin-bottom: 16px;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  animation: slideIn 0.4s ease backwards;
}

.question-card:nth-child(1) { animation-delay: 0.05s; }
.question-card:nth-child(2) { animation-delay: 0.15s; }
.question-card:nth-child(3) { animation-delay: 0.25s; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

.question-card.answered-correct { border-left-color: var(--green); }
.question-card.answered-wrong   { border-left-color: var(--red); }

.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.q-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--orange);
  text-transform: uppercase;
}

.q-divider {
  flex: 1;
  height: 1px;
  background: #2a2a2a;
  margin: 0 12px;
}

.status-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 2px;
  text-transform: uppercase;
}

.status-badge.correct { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid #4caf50; }
.status-badge.wrong   { background: rgba(229,57,53,0.15);  color: #ef5350; border: 1px solid #e53935; }

.question-text {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--white);
  margin-bottom: 16px;
}

/* ══════════════ OPTIONS ══════════════ */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option-btn {
  background: var(--dark3);
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  padding: 12px 14px;
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.option-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: rgba(255,102,0,0.08);
  transition: width 0.2s;
}

.option-btn:not(:disabled):active::before { width: 100%; }
.option-btn:not(:disabled):hover { border-color: var(--orange); color: var(--orange3); }

.option-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 2px;
  background: #2a2a2a;
  border: 1px solid #333;
  font-family: 'Oswald', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--chrome2);
  flex-shrink: 0;
  transition: all 0.18s;
}

.option-btn:not(:disabled):hover .option-letter {
  background: var(--orange);
  border-color: var(--orange);
  color: #000;
}

.option-btn.correct {
  border-color: var(--green);
  background: rgba(76,175,80,0.1);
  color: #81c784;
}
.option-btn.correct .option-letter { background: var(--green); border-color: var(--green); color: #000; }

.option-btn.wrong {
  border-color: var(--red);
  background: rgba(229,57,53,0.1);
  color: #ef9a9a;
}
.option-btn.wrong .option-letter { background: var(--red); border-color: var(--red); color: #fff; }

.option-btn:disabled { cursor: default; }

.result-icon {
  margin-left: auto;
  font-size: 1rem;
}

/* ══════════════ RESULT SECTION ══════════════ */
#result-section { display: none; }

.result-card {
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  animation: revealCard 0.6s cubic-bezier(.2,.8,.3,1) forwards;
}

@keyframes revealCard {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Flame-style top bar */
.result-topbar {
  height: 5px;
  background: linear-gradient(90deg, var(--orange2), var(--orange3), var(--orange2));
  background-size: 200%;
  animation: shimmer 2s infinite linear;
}

.result-topbar.fail-bar {
  background: linear-gradient(90deg, var(--red), #ff6b6b, var(--red));
  background-size: 200%;
}

.result-body {
  background: var(--dark2);
  border: 1px solid #2a2a2a;
  border-top: none;
  padding: 28px 22px 24px;
  text-align: center;
}

.result-icon-big {
  font-size: 3rem;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 12px rgba(255,102,0,0.5));
}

.result-title {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.result-title.success-title { color: var(--orange); }
.result-title.fail-title    { color: var(--red); }

.result-sub {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--chrome2);
  line-height: 1.6;
  margin-bottom: 22px;
}

/* Score dots */
.score-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
}

.sdot {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 700;
  border: 2px solid #333;
  background: var(--dark3);
}

.sdot.ok   { border-color: var(--green); background: rgba(76,175,80,0.15); color: #81c784; }
.sdot.fail { border-color: var(--red);   background: rgba(229,57,53,0.12);  color: #ef9a9a; }

/* QR area */
.qr-section {
  margin-bottom: 20px;
}

.qr-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.qr-wrapper {
  display: inline-block;
  background: #fff;
  padding: 14px;
  border-radius: 4px;
  border: 3px solid var(--orange);
  box-shadow: 0 0 30px rgba(255,102,0,0.35), 0 0 60px rgba(255,102,0,0.1);
}

.qr-hint {
  margin-top: 12px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--chrome2);
  letter-spacing: 0.5px;
}

/* Retry button */
.retry-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--orange2) 0%, var(--orange3) 100%);
  border: none;
  border-radius: 3px;
  padding: 15px;
  color: #000;
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(255,102,0,0.35);
}

.retry-btn:active { transform: scale(0.98); opacity: 0.9; }

/* ── Decorative bottom bar ── */
.chrome-bar {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--chrome), var(--chrome2), var(--chrome), transparent);
  margin-top: 32px;
  opacity: 0.3;
}

</style>
</head>

<script>
// ============================================================
//  ⚙️  CONFIGURAZIONE
// ============================================================
const CONFIG = {
  gruppo:     "Aquile",
  checkpoint: 5,
  gpxUrl:     "",

  questions: [
    {
      text: "Nel mondo HOG, cosa indica il termine \"Chapter\"?",
      options: ["Un capitolo di un libro ufficiale Harley", "Un singolo club locale affiliato all'HOG", "Un modello di moto", "Un evento annuale unico"],
      c: "OA=="
    },
    {
      text: "Quale modello Harley-Davidson, prodotto dal 2001 al 2017, aveva un design rivoluzionario co-sviluppato con Porsche?",
      options: ["V-Rod", "Night Rod", "Street Rod", "Fat Rod"],
      c: "Nw=="
    },
    {
      text: "Cosa significa la sigla CVO sui modelli Harley-Davidson di fascia alta?",
      options: ["Custom Vehicle Operations", "Classic Vintage Original", "Chrome Value Option", "Custom Value Output"],
      c: "Nw=="
    }
  ]
};
CONFIG.minCorrect = CONFIG.questions.length;
function decodeAnswer(c) { return parseInt(atob(c), 10) - 7; }
// ============================================================

const letters = ['A','B','C','D'];
let answered = [];
let answeredCount = 0;

function renderQuestions() {
  const sec = document.getElementById('questions-section');
  sec.innerHTML = '';
  CONFIG.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${qi}`;
    const opts = q.options.map((opt, oi) => `
      <button class="option-btn" onclick="answer(${qi},${oi})" id="opt-${qi}-${oi}">
        <span class="option-letter">${letters[oi]}</span>
        ${opt}
        <span class="result-icon" id="icon-${qi}-${oi}"></span>
      </button>`).join('');
    card.innerHTML = `
      <div class="q-header">
        <div class="q-label">Domanda ${qi + 1}</div>
        <div class="q-divider"></div>
        <div id="badge-${qi}"></div>
      </div>
      <p class="question-text">${q.text}</p>
      <div class="options">${opts}</div>`;
    sec.appendChild(card);
  });
  updateProgress();
}

function answer(qi, oi) {
  if (answered[qi] !== undefined) return;
  const isCorrect = oi === decodeAnswer(CONFIG.questions[qi].c);
  answered[qi] = isCorrect;
  answeredCount++;

  const card = document.getElementById(`card-${qi}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const badge = document.getElementById(`badge-${qi}`);
  badge.innerHTML = `<span class="status-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Esatto' : '✗ Errato'}</span>`;

  const n = CONFIG.questions[qi].options.length;
  for (let i = 0; i < n; i++) {
    const btn  = document.getElementById(`opt-${qi}-${i}`);
    const icon = document.getElementById(`icon-${qi}-${i}`);
    btn.disabled = true;
    if (i === oi && isCorrect)  { btn.classList.add('correct'); icon.textContent = '✓'; }
    else if (i === oi)          { btn.classList.add('wrong');   icon.textContent = '✗'; }
  }

  updateProgress();
  if (answeredCount === CONFIG.questions.length) setTimeout(showResult, 700);
}

function updateProgress() {
  const pct = (answeredCount / CONFIG.questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answeredCount} / ${CONFIG.questions.length}`;
}

function resetQuiz() {
